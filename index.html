<script>
(async () => {
  const res = await fetch('tools.json', {cache: 'no-cache'});
  const tools = await res.json();

  const langColors = {
    'Ruby': '#701516',
    'Go': '#00ADD8',
    'C': '#555555',
    'Rust': '#dea584',
    'Swift': '#F05138',
    'TypeScript': '#3178c6',
    'JavaScript': '#f1e05a',
    'Elixir': '#6e4a7e',
    'Makefile': '#427819',
    'Dockerfile': '#384d54',
    'C++': '#f34b7d',
    'Jsonnet': '#0064bd',
    'Shell': '#89e051',
    'HCL': '#844FBA',
    'Yacc': '#4B6C4B',
    'Python': '#3572A5',
    'Perl': '#0298c3',
  };

  const order = [
    'Terraform', 'AWS', 'Kubernetes', 'Docker / Container',
    'MySQL', 'PostgreSQL', 'Database', 'KVS / Cache',
    'macOS / iOS', 'CLI', 'Git / GitHub',
    'Logging', 'Monitoring', 'Benchmark / Perf',
    'Auth / Security', 'DNS / Network', 'Chat / Slack', 'Web / Browser',
    'Compression', 'Email',
    'Ruby gem', 'Go tool', 'Rust tool', 'Elixir', 'JS / TS', 'C',
    'Utility', 'Other'
  ];

  // Normalize: ensure every tool has a non-empty `categories` array.
  for (const t of tools) {
    if (!Array.isArray(t.categories) || t.categories.length === 0) {
      t.categories = [t.category || 'Other'];
    }
  }
  const primaryCat = t => t.categories[0];

  const catCount = new Map(), langCount = new Map();
  for (const t of tools) {
    for (const c of t.categories) {
      catCount.set(c, (catCount.get(c) || 0) + 1);
    }
    const l = t.language && t.language !== 'none' ? t.language : null;
    if (l) langCount.set(l, (langCount.get(l) || 0) + 1);
  }
  const cats = [...catCount.keys()].sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
  });
  const langs = [...langCount.keys()].sort((a, b) => langCount.get(b) - langCount.get(a));

  const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

  const state = {
    q: '',
    cats: new Set(),
    langs: new Set(),
    sort: 'newest',
  };

  // hydrate from URL hash
  const params = new URLSearchParams(location.hash.slice(1));
  state.q = params.get('q') || '';
  if (params.get('cat')) params.get('cat').split(',').filter(Boolean).forEach(c => state.cats.add(c));
  if (params.get('lang')) params.get('lang').split(',').filter(Boolean).forEach(l => state.langs.add(l));
  if (['category', 'newest', 'oldest', 'stars'].includes(params.get('sort'))) state.sort = params.get('sort');

  const search = document.getElementById('search');
  const searchClear = document.getElementById('search-clear');
  search.value = state.q;
  const updateClearBtn = () => { searchClear.hidden = search.value === ''; };
  updateClearBtn();

  const catFilter = document.getElementById('cat-filter');
  catFilter.innerHTML = cats.map(c =>
    `<button type="button" class="chip" data-kind="cat" data-value="${c}">${c} <span class="count">${catCount.get(c)}</span></button>`
  ).join('');

  const langFilter = document.getElementById('lang-filter');
  langFilter.innerHTML = langs.map(l => {
    const color = langColors[l] || '#9aa0a6';
    return `<button type="button" class="chip chip-lang" data-kind="lang" data-value="${l}"><span class="lang-dot" style="background:${color}"></span>${l} <span class="count">${langCount.get(l)}</span></button>`;
  }).join('');

  const app = document.getElementById('app');
  const resultCount = document.getElementById('result-count');

  // category color palette (golden-angle HSL for distinct hues)
  const catColors = new Map();
  cats.forEach((c, i) => {
    const hue = (i * 137.508) % 360;
    catColors.set(c, `hsl(${hue.toFixed(1)}, 55%, 55%)`);
  });

  function renderPie(svgEl, legendEl, data, kind, activeSet) {
    const total = data.reduce((a, b) => a + b.value, 0);
    const r = 80, cx = 100, cy = 100;
    let acc = 0;
    const slices = data.map(d => {
      const a0 = (acc / total) * 2 * Math.PI - Math.PI / 2;
      acc += d.value;
      const a1 = (acc / total) * 2 * Math.PI - Math.PI / 2;
      const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const large = (a1 - a0) > Math.PI ? 1 : 0;
      const isActive = activeSet.size === 0 || activeSet.has(d.name);
      let path;
      if (data.length === 1) {
        path = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${d.color}" class="slice ${isActive ? '' : 'dim'}" data-name="${escapeAttr(d.name)}" data-kind="${kind}"><title>${escapeAttr(d.name)}: ${d.value}</title></circle>`;
      } else {
        path = `<path d="M ${cx} ${cy} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z" fill="${d.color}" class="slice ${isActive ? '' : 'dim'}" data-name="${escapeAttr(d.name)}" data-kind="${kind}"><title>${escapeAttr(d.name)}: ${d.value} (${(d.value / total * 100).toFixed(1)}%)</title></path>`;
      }
      return path;
    }).join('');
    svgEl.innerHTML = slices;
    legendEl.innerHTML = data.map(d => {
      const isActive = activeSet.size === 0 || activeSet.has(d.name);
      return `<li class="${isActive ? '' : 'dim'}" data-name="${escapeAttr(d.name)}" data-kind="${kind}">
        <span class="swatch" style="background:${d.color}"></span>
        <span class="legend-name">${escapeHtml(d.name)}</span>
        <span class="legend-count">${d.value}</span>
      </li>`;
    }).join('');
  }
  function escapeAttr(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderStats() {
    const filtered = tools.filter(matches);
    const catData = new Map(), langData = new Map();
    for (const t of filtered) {
      for (const c of t.categories) {
        catData.set(c, (catData.get(c) || 0) + 1);
      }
      const l = t.language && t.language !== 'none' ? t.language : null;
      if (l) langData.set(l, (langData.get(l) || 0) + 1);
    }
    const catArr = cats.filter(c => catData.has(c)).map(c => ({
      name: c, value: catData.get(c), color: catColors.get(c)
    }));
    const langArr = [...langData.entries()]
      .sort((a, b) => b[1] - a[1])
      .map(([l, v]) => ({ name: l, value: v, color: langColors[l] || '#9aa0a6' }));

    if (catArr.length) renderPie(
      document.getElementById('pie-cat'),
      document.getElementById('legend-cat'),
      catArr, 'cat', state.cats);
    if (langArr.length) renderPie(
      document.getElementById('pie-lang'),
      document.getElementById('legend-lang'),
      langArr, 'lang', state.langs);

    renderBars(document.getElementById('bars-created'), filtered, state.langs);
  }

  function renderBars(svgEl, filtered, activeLangs) {
    // bucket by YYYY-MM, then by language
    const buckets = new Map();
    const allMonths = new Set();
    const allLangsSeen = new Set();
    for (const t of filtered) {
      const ym = (t.created || '').slice(0, 7);
      if (!ym) continue;
      const l = (t.language && t.language !== 'none') ? t.language : 'Other';
      allLangsSeen.add(l);
      if (!buckets.has(ym)) buckets.set(ym, new Map());
      const m = buckets.get(ym);
      m.set(l, (m.get(l) || 0) + 1);
    }
    // full range from earliest to latest tool overall (not just filtered)
    let minYM = null, maxYM = null;
    for (const t of tools) {
      const ym = (t.created || '').slice(0, 7);
      if (!ym) continue;
      if (!minYM || ym < minYM) minYM = ym;
      if (!maxYM || ym > maxYM) maxYM = ym;
    }
    if (!minYM) { svgEl.innerHTML = ''; return; }
    const months = [];
    let [y, m] = minYM.split('-').map(Number);
    const [ey, em] = maxYM.split('-').map(Number);
    while (y < ey || (y === ey && m <= em)) {
      months.push(`${y}-${String(m).padStart(2, '0')}`);
      m++; if (m > 12) { m = 1; y++; }
    }
    allMonths.clear(); months.forEach(x => allMonths.add(x));

    const W = 1040, H = 200;
    const PAD_L = 28, PAD_R = 8, PAD_T = 10, PAD_B = 24;
    const plotW = W - PAD_L - PAD_R;
    const plotH = H - PAD_T - PAD_B;
    const barGap = 1;
    const barW = (plotW - barGap * (months.length - 1)) / months.length;

    let maxTotal = 0;
    for (const m of months) {
      const b = buckets.get(m);
      if (!b) continue;
      let s = 0; for (const v of b.values()) s += v;
      if (s > maxTotal) maxTotal = s;
    }
    if (maxTotal === 0) maxTotal = 1;
    // round up y_max to a tidy step
    const step = maxTotal <= 5 ? 1 : maxTotal <= 10 ? 2 : maxTotal <= 30 ? 5 : 10;
    const yMax = Math.ceil(maxTotal / step) * step;

    // language stacking order: by total count desc (stable across re-renders)
    const langTotals = new Map();
    for (const b of buckets.values()) {
      for (const [l, v] of b) langTotals.set(l, (langTotals.get(l) || 0) + v);
    }
    const langOrder = [...langTotals.entries()].sort((a, b) => b[1] - a[1]).map(([l]) => l);

    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const parts = [];
    // gridlines + y labels
    for (let v = 0; v <= yMax; v += step) {
      const yy = PAD_T + plotH - (v / yMax) * plotH;
      parts.push(`<line class="grid" x1="${PAD_L}" y1="${yy}" x2="${W - PAD_R}" y2="${yy}"/>`);
      parts.push(`<text x="${PAD_L - 4}" y="${yy + 3}" text-anchor="end">${v}</text>`);
    }
    // bars
    for (let i = 0; i < months.length; i++) {
      const ym = months[i];
      const b = buckets.get(ym);
      if (!b) continue;
      const x = PAD_L + i * (barW + barGap);
      let cum = 0;
      for (const lang of langOrder) {
        const n = b.get(lang) || 0;
        if (!n) continue;
        const h = (n / yMax) * plotH;
        const y = PAD_T + plotH - ((cum + n) / yMax) * plotH;
        const color = langColors[lang] || '#9aa0a6';
        const isActive = activeLangs.size === 0 || activeLangs.has(lang);
        parts.push(`<rect class="bar ${isActive ? '' : 'dim'}" x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barW.toFixed(2)}" height="${h.toFixed(2)}" fill="${color}" data-name="${escapeAttr(lang)}" data-kind="lang"><title>${ym} · ${escapeAttr(lang)}: ${n}</title></rect>`);
        cum += n;
      }
    }
    // x-axis year ticks (Jan of each year + last year)
    const yearsSeen = new Set();
    for (let i = 0; i < months.length; i++) {
      const ym = months[i];
      const yr = ym.slice(0, 4);
      if (ym.endsWith('-01') || i === 0) {
        if (yearsSeen.has(yr)) continue;
        yearsSeen.add(yr);
        const x = PAD_L + i * (barW + barGap) + barW / 2;
        parts.push(`<text x="${x.toFixed(2)}" y="${H - PAD_B + 14}" text-anchor="middle">${yr}</text>`);
      }
    }

    svgEl.innerHTML = parts.join('');
  }

  function syncHash() {
    const p = new URLSearchParams();
    if (state.q) p.set('q', state.q);
    if (state.cats.size) p.set('cat', [...state.cats].join(','));
    if (state.langs.size) p.set('lang', [...state.langs].join(','));
    if (state.sort !== 'newest') p.set('sort', state.sort);
    const s = p.toString();
    history.replaceState(null, '', s ? '#' + s : location.pathname);
  }

  function highlight(text, q) {
    if (!q) return escapeHtml(text);
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    return escapeHtml(text).replace(re, '<mark>$1</mark>');
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function matches(t) {
    if (state.cats.size && !t.categories.some(c => state.cats.has(c))) return false;
    if (state.langs.size && !state.langs.has(t.language)) return false;
    if (state.q) {
      const q = state.q.toLowerCase();
      const hay = `${t.name} ${t.description || ''} ${t.categories.join(' ')} ${t.language || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }

  function cardHtml(t) {
    const catChips = t.categories.map(c => {
      const color = catColors.get(c) || '#9aa0a6';
      return `<button type="button" class="cat-chip" data-kind="cat" data-value="${escapeAttr(c)}" style="--cat-color:${color}">${escapeHtml(c)}</button>`;
    }).join('');
    return `
      <li class="card">
        <h3>
          <a href="${t.url}">${highlight(t.name, state.q)}</a>
          <button type="button" class="readme-btn" data-readme="${escapeAttr(t.url)}" data-name="${escapeAttr(t.name)}" title="View README" aria-label="View README">README</button>
        </h3>
        <div class="cats">${catChips}</div>
        <div class="meta">
          ${(t.languages && t.languages.length ? t.languages : (t.language && t.language !== 'none' ? [t.language] : [])).map(l => `<span class="lang"><span class="lang-dot" style="background:${langColors[l] || '#9aa0a6'}"></span>${escapeHtml(l)}</span>`).join('')}
          ${t.stars ? `<span class="stars">★ ${t.stars}</span>` : ''}
          ${t.created ? `<span class="created" title="published">${t.created}</span>` : ''}
          ${t.updated ? `<span class="updated" title="last push">${t.updated}</span>` : ''}
        </div>
        <p>${t.description ? highlight(t.description, state.q) : ''}</p>
      </li>
    `;
  }

  function render() {
    for (const btn of catFilter.querySelectorAll('.chip')) {
      btn.classList.toggle('active', state.cats.has(btn.dataset.value));
    }
    for (const btn of langFilter.querySelectorAll('.chip')) {
      btn.classList.toggle('active', state.langs.has(btn.dataset.value));
    }
    for (const btn of document.querySelectorAll('.sort-btn')) {
      btn.classList.toggle('active', state.sort === btn.dataset.sort);
    }

    renderStats();

    const filtered = tools.filter(matches);
    resultCount.textContent = `${filtered.length} / ${tools.length}`;

    if (filtered.length === 0) {
      app.innerHTML = `<p class="loading">no results.</p>`;
      return;
    }

    if (state.sort === 'category') {
      const grouped = new Map();
      for (const t of filtered) {
        const c = primaryCat(t);
        if (!grouped.has(c)) grouped.set(c, []);
        grouped.get(c).push(t);
      }
      const visible = [...grouped.keys()].sort((a, b) => {
        const ia = order.indexOf(a), ib = order.indexOf(b);
        return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
      });
      app.innerHTML = visible.map(c => {
        const items = grouped.get(c).sort((a, b) => (b.stars || 0) - (a.stars || 0));
        return `
          <section id="${slug(c)}">
            <h2>${c} <span class="count">${items.length}</span></h2>
            <ul class="cards">${items.map(cardHtml).join('')}</ul>
          </section>
        `;
      }).join('');
    } else if (state.sort === 'stars') {
      const sorted = [...filtered].sort((a, b) => {
        const d = (b.stars || 0) - (a.stars || 0);
        return d !== 0 ? d : a.name.localeCompare(b.name);
      });
      app.innerHTML = `
        <section>
          <ul class="cards">${sorted.map(cardHtml).join('')}</ul>
        </section>
      `;
    } else {
      const dir = state.sort === 'newest' ? -1 : 1;
      const sorted = [...filtered].sort((a, b) => {
        const ad = a.created || '', bd = b.created || '';
        if (ad === bd) return a.name.localeCompare(b.name);
        return ad < bd ? -1 * dir : 1 * dir;
      });
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const byYear = new Map();
      for (const t of sorted) {
        const y = (t.created || '????').slice(0, 4);
        const mo = (t.created || '').slice(5, 7);
        if (!byYear.has(y)) byYear.set(y, new Map());
        const byMonth = byYear.get(y);
        if (!byMonth.has(mo)) byMonth.set(mo, []);
        byMonth.get(mo).push(t);
      }
      app.innerHTML = [...byYear.entries()].map(([y, byMonth]) => {
        const yearCount = [...byMonth.values()].reduce((n, a) => n + a.length, 0);
        const months = [...byMonth.entries()].map(([mo, items]) => {
          const idx = parseInt(mo, 10) - 1;
          const label = idx >= 0 && idx < 12 ? monthNames[idx] : '??';
          return `
            <h3 class="month">${label} <span class="count">${items.length}</span></h3>
            <ul class="cards">${items.map(cardHtml).join('')}</ul>
          `;
        }).join('');
        return `
          <section id="y-${y}">
            <h2>${y} <span class="count">${yearCount}</span></h2>
            ${months}
          </section>
        `;
      }).join('');
    }
  }

  // events
  let debounce;
  search.addEventListener('input', e => {
    updateClearBtn();
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.q = e.target.value.trim();
      syncHash();
      render();
    }, 80);
  });
  searchClear.addEventListener('click', () => {
    search.value = '';
    state.q = '';
    updateClearBtn();
    syncHash();
    render();
    search.focus();
  });

  function toggleChip(set, value) {
    if (set.has(value)) set.delete(value); else set.add(value);
  }
  catFilter.addEventListener('click', e => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    toggleChip(state.cats, btn.dataset.value);
    syncHash();
    render();
  });
  langFilter.addEventListener('click', e => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    toggleChip(state.langs, btn.dataset.value);
    syncHash();
    render();
  });
  document.getElementById('sort').addEventListener('click', e => {
    const btn = e.target.closest('.sort-btn');
    if (!btn) return;
    state.sort = btn.dataset.sort;
    syncHash();
    render();
  });

  function handleStatClick(e) {
    const el = e.target.closest('[data-kind][data-name]');
    if (!el) return;
    const set = el.dataset.kind === 'cat' ? state.cats : state.langs;
    toggleChip(set, el.dataset.name);
    syncHash();
    render();
  }
  document.getElementById('stats').addEventListener('click', handleStatClick);

  document.getElementById('app').addEventListener('click', e => {
    const readmeBtn = e.target.closest('.readme-btn');
    if (readmeBtn) {
      e.preventDefault();
      openReadme(readmeBtn.dataset.readme, readmeBtn.dataset.name);
      return;
    }
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    e.preventDefault();
    toggleChip(state.cats, btn.dataset.value);
    syncHash();
    render();
  });

  // README modal
  const modal = document.getElementById('readme-modal');
  const modalTitle = document.getElementById('readme-title');
  const modalBody = document.getElementById('readme-body');
  const readmeCache = new Map();

  // Persist rendered READMEs across sessions so revisits don't re-hit the API
  // (unauthenticated GitHub API is limited to 60 requests/hour per IP).
  const README_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days
  const lsKey = repo => `readme:v2:${repo}`;
  function getStoredReadme(repo) {
    try {
      const raw = localStorage.getItem(lsKey(repo));
      if (!raw) return null;
      const { html, ts } = JSON.parse(raw);
      if (!html || Date.now() - ts > README_TTL) { localStorage.removeItem(lsKey(repo)); return null; }
      return html;
    } catch { return null; }
  }
  function setStoredReadme(repo, html) {
    let payload;
    try { payload = JSON.stringify({ html, ts: Date.now() }); } catch { return; }
    try {
      localStorage.setItem(lsKey(repo), payload);
    } catch {
      // quota exceeded — evict other cached READMEs and retry once
      try {
        for (const k of Object.keys(localStorage)) if (k.startsWith('readme:')) localStorage.removeItem(k);
        localStorage.setItem(lsKey(repo), payload);
      } catch { /* give up on persisting */ }
    }
  }

  // Absolute already? (scheme, protocol-relative, in-page anchor, mailto/data)
  function isAbsUrl(v) {
    return /^(https?:)?\/\//i.test(v) || v.startsWith('#') ||
           v.startsWith('mailto:') || v.startsWith('data:') || v.startsWith('tel:');
  }
  // GitHub bakes user-uploaded assets into README HTML as short-lived signed
  // private-user-images URLs (JWT expires in ~5 min), which breaks once we cache
  // the HTML. Rewrite them back to the stable public user-attachments URL, which
  // redirects to a freshly-signed asset on every request.
  function stabilizeAsset(v) {
    const m = /private-user-images\.githubusercontent\.com\/[^"'\s]*?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})/i.exec(v || '');
    return m ? `https://github.com/user-attachments/assets/${m[1]}` : null;
  }
  function rewriteRelativeUrls(root, repo) {
    const clean = v => v.replace(/^\.\//, '').replace(/^\//, '');
    root.querySelectorAll('img[src]').forEach(img => {
      const v = img.getAttribute('src');
      const stable = stabilizeAsset(v);
      if (stable) {
        img.setAttribute('src', stable);
      } else if (v && !isAbsUrl(v)) {
        img.setAttribute('src', `https://raw.githubusercontent.com/${repo}/HEAD/${clean(v)}`);
      }
    });
    root.querySelectorAll('a[href]').forEach(a => {
      const v = a.getAttribute('href');
      const stable = stabilizeAsset(v);
      if (stable) {
        a.setAttribute('href', stable);
      } else if (v && !isAbsUrl(v)) {
        a.setAttribute('href', `https://github.com/${repo}/blob/HEAD/${clean(v)}`);
      }
    });
  }

  async function openReadme(url, name) {
    const m = /github\.com\/([^/]+)\/([^/]+)/.exec(url || '');
    modalTitle.textContent = name || 'README';
    modalTitle.href = url || '#';
    // lock the page behind the modal so its scrollbar doesn't double up
    const sw = window.innerWidth - document.documentElement.clientWidth;
    document.body.style.overflow = 'hidden';
    if (sw > 0) document.body.style.paddingRight = `${sw}px`;
    modal.showModal();
    modalBody.scrollTop = 0;
    if (!m) { modalBody.innerHTML = `<p class="loading">Invalid repository URL.</p>`; return; }
    const repo = `${m[1]}/${m[2]}`;

    if (readmeCache.has(repo)) { modalBody.innerHTML = readmeCache.get(repo); return; }
    const stored = getStoredReadme(repo);
    if (stored) { readmeCache.set(repo, stored); modalBody.innerHTML = stored; return; }
    modalBody.innerHTML = `<p class="loading">loading README…</p>`;
    try {
      const res = await fetch(`https://api.github.com/repos/${repo}/readme`, {
        headers: { Accept: 'application/vnd.github.html+json' },
      });
      if (res.status === 404) { modalBody.innerHTML = `<p class="loading">No README found for this repository.</p>`; return; }
      if (res.status === 403) { modalBody.innerHTML = `<p class="loading">GitHub API rate limit reached. Please try again later, or <a href="${url}" target="_blank" rel="noopener noreferrer">open on GitHub</a>.</p>`; return; }
      if (!res.ok) { modalBody.innerHTML = `<p class="loading">Failed to load README (HTTP ${res.status}).</p>`; return; }
      const html = await res.text();
      modalBody.innerHTML = html;
      // GitHub leaves same-repo relative paths (images, file links) untouched;
      // resolve them against the repo so they don't 404 against our own origin.
      rewriteRelativeUrls(modalBody, repo);
      readmeCache.set(repo, modalBody.innerHTML);
      setStoredReadme(repo, modalBody.innerHTML);
      modalBody.scrollTop = 0;
    } catch (err) {
      modalBody.innerHTML = `<p class="loading">Failed to load README. <a href="${url}" target="_blank" rel="noopener noreferrer">Open on GitHub</a>.</p>`;
    }
  }

  function closeReadme() { modal.close(); }
  document.getElementById('readme-close').addEventListener('click', closeReadme);
  // click outside the content (on the backdrop) closes
  modal.addEventListener('click', e => {
    if (e.target === modal) closeReadme();
  });
  modal.addEventListener('close', () => {
    modalBody.innerHTML = '';
    document.body.style.overflow = '';
    document.body.style.paddingRight = '';
  });
  // keep README links from navigating the page away
  modalBody.addEventListener('click', e => {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (href.startsWith('#')) {
      // in-page anchor: scroll within the modal (GitHub prefixes ids with user-content-)
      e.preventDefault();
      const slug = href.slice(1);
      const target = modalBody.querySelector(`#user-content-${CSS.escape(slug)}`) ||
                     modalBody.querySelector(`#${CSS.escape(slug)}`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      // external link: open in a new tab, never leave this page
      e.preventDefault();
      window.open(a.href, '_blank', 'noopener,noreferrer');
    }
  });

  // keyboard shortcut: '/' to focus search
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== search) {
      e.preventDefault();
      search.focus();
      search.select();
    }
    if (e.key === 'Escape' && document.activeElement === search) {
      search.value = '';
      state.q = '';
      updateClearBtn();
      syncHash();
      render();
    }
  });

  render();
})().catch(e => {
  document.getElementById('app').innerHTML = `<p class="loading">failed to load: ${e}</p>`;
});
</script>
